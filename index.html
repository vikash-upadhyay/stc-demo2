<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stc — Postpaid Plans</title>

<!-- CI360 -->
<script>
(function(ci,a){window[ci]||function(){var ef=window[ci]=function(){return ef.q.push(arguments);};ef.q=[];ef.a=a||{};}();})('ci360',{tenantId:'2a7ea85c0b000164f7542674'});
</script>
<script async src="https://ingest-training.ci360.sas.com/js/ot2.min.js"></script>

<style>
body{font-family:sans-serif;margin:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.overlay.open{display:flex}
.checkout{background:#fff;padding:20px;border-radius:10px;width:300px}
#checkout-upsell-spot{transition:.3s}
.spot-hidden{max-height:0;opacity:0;overflow:hidden}
.spot-visible{max-height:200px;opacity:1;margin-bottom:10px}
button{margin:5px;padding:10px}
</style>
</head>

<body>

<h2>Plans</h2>

<button onclick="openCheckout('mofawtar 1',80,false)">mofawtar 1</button>
<button onclick="openCheckout('mofawtar 2',138,true)">mofawtar 2</button>
<button onclick="openCheckout('mofawtar 4',518,false)">mofawtar 4</button>

<!-- CHECKOUT -->
<div class="overlay" id="overlay">
  <div class="checkout">
    <h3 id="plan"></h3>

    <!-- SPOT -->
    <div id="checkout-upsell-spot" class="spot-hidden"></div>

    <p id="price"></p>

    <button onclick="closeCheckout()">Close</button>
  </div>
</div>

<script>
var currentPlan='';
var currentPrice=0;

/* 🔥 FORCE CI EVENT */
function triggerCI360Event(plan, price){
  if(window.ci360){
    console.log('CI EVENT',plan,Date.now());
    ci360('event','Checkout Button Click',{
      plan:plan,
      price:price,
      ts:Date.now()
    });
  }
}

/* 🚀 MAIN FIXED FUNCTION */
function openCheckout(plan, price, showSpot){
  currentPlan=plan;
  currentPrice=price;

  document.getElementById('plan').textContent=plan;
  document.getElementById('price').textContent=price+' SAR';

  var spot=document.getElementById('checkout-upsell-spot');

  if(showSpot){

    /* RESET FIRST */
    spot.innerHTML='';

    spot.classList.remove('spot-hidden');
    spot.classList.add('spot-visible');

    /* 🔑 CRITICAL DELAY */
    setTimeout(function(){
      triggerCI360Event(plan,price);
    },120);

  }else{
    spot.classList.remove('spot-visible');
    spot.classList.add('spot-hidden');
  }

  document.getElementById('overlay').classList.add('open');
}

/* CLOSE */
function closeCheckout(){
  document.getElementById('overlay').classList.remove('open');
  resetSpot();
}

/* RESET FIXED */
function resetSpot(){
  var spot=document.getElementById('checkout-upsell-spot');

  spot.classList.remove('spot-visible');
  spot.classList.add('spot-hidden');

  setTimeout(function(){
    spot.innerHTML='';
  },50);
}
</script>

</body>
</html>
