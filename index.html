<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>stc — Postpaid Plans</title>

<!-- CI 360 -->
<script>
(function(ci,a){window[ci]||function(){
var ef=window[ci]=function(){return ef.q.push(arguments)};
ef.q=[];ef.a=a||{};
}()} )('ci360',{tenantId:'2a7ea85c0b000164f7542674'});
</script>
<script async src="https://ingest-training.ci360.sas.com/js/ot2.min.js"></script>

<style>
body{font-family:sans-serif;margin:0;background:#fafafa}

/* SIMPLE minimal styles */
.plans{display:flex;gap:20px;padding:40px}
.card{background:#fff;padding:20px;border-radius:10px;border:1px solid #ddd}
button{padding:10px 16px;cursor:pointer}

/* overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.overlay.open{display:flex}
.panel{background:#fff;padding:20px;border-radius:10px;width:320px}

/* CI SPOT */
#checkout-upsell-spot{
transition:all .3s;
overflow:hidden;
}
.spot-hidden{max-height:0;opacity:0}
.spot-visible{max-height:200px;opacity:1;margin-bottom:10px}
</style>
</head>

<body>

<div class="plans">

  <div class="card">
    <h3>mofawtar 1</h3>
    <button onclick="openCheckout('mofawtar 1',80,false)">Checkout</button>
  </div>

  <div class="card">
    <h3>mofawtar 2</h3>
    <button id="btn-checkout-mofawtar2"
      onclick="openCheckout('mofawtar 2',138,true)">
      Checkout
    </button>
  </div>

  <div class="card">
    <h3>mofawtar 4</h3>
    <button onclick="openCheckout('mofawtar 4',518,false)">Checkout</button>
  </div>

</div>

<!-- CHECKOUT -->
<div class="overlay" id="overlay">
  <div class="panel">

    <!-- CI 360 SPOT (DO NOT TOUCH ID EVER) -->
    <div id="checkout-upsell-spot" class="spot-hidden"></div>

    <h4 id="plan"></h4>
    <p id="price"></p>

    <button onclick="closeCheckout()">Close</button>

  </div>
</div>

<script>
var currentPlan = '';
var currentPrice = 0;

function openCheckout(plan, price, showSpot){
  currentPlan = plan;
  currentPrice = price;

  document.getElementById('plan').textContent = plan;
  document.getElementById('price').textContent = price + ' SAR';

  var spot = document.getElementById('checkout-upsell-spot');

  if(showSpot){
    // 1. SHOW SPOT FIRST
    spot.classList.remove('spot-hidden');
    spot.classList.add('spot-visible');

    // 2. WAIT FOR DOM + CSS APPLY
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{

        // 3. FIRE CI EVENT AFTER VISIBLE
        if(window.ci360){
          try{
            ci360('event','Checkout Button Click');
          }catch(e){
            console.log('ci360 error', e);
          }
        }

      });
    });

  }else{
    spot.classList.remove('spot-visible');
    spot.classList.add('spot-hidden');
  }

  document.getElementById('overlay').classList.add('open');
}

function closeCheckout(){
  document.getElementById('overlay').classList.remove('open');
  resetSpot();
}

function resetSpot(){
  var spot = document.getElementById('checkout-upsell-spot');

  // IMPORTANT: DO NOT CLEAR innerHTML
  spot.classList.remove('spot-visible');
  spot.classList.add('spot-hidden');
}
</script>

</body>
</html>
